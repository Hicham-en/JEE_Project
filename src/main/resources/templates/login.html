<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | AnnotateNLP</title>
    <!-- Google Fonts import -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0A0A0F;
            color: #FFFFFF;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo-title {
            font-family: 'Space Mono', monospace;
            font-size: 32px;
            margin-bottom: 30px;
            color: #FFFFFF;
        }
        
        .logo-title span {
            color: #00D4FF;
        }

        .form-group {
            position: relative;
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group svg {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            fill: #666;
            width: 20px;
            height: 20px;
        }

        .form-control {
            width: 100%;
            padding: 14px 14px 14px 44px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #FFF;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #00D4FF;
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(90deg, #00D4FF 0%, #8A2BE2 100%);
            color: #FFF;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: filter 0.3s, transform 0.1s;
        }

        .btn-submit:hover {
            filter: brightness(1.2);
        }
        
        .btn-submit:active {
            transform: scale(0.98);
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .alert-error {
            background: rgba(255, 70, 70, 0.1);
            border: 1px solid rgba(255, 70, 70, 0.3);
            color: #FF4646;
        }

        .alert-success {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: #2ECC71;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="logo-title">Annotate<span>NLP</span></h1>

        <div th:if="${error}" class="alert alert-error">
            Nom d'utilisateur, mot de passe incorrect, ou compte désactivé.
        </div>
        
        <div th:if="${roleError}" class="alert alert-error">
            Rôle non autorisé pour accéder au système.
        </div>

        <div th:if="${logout}" class="alert alert-success">
            Vous avez été déconnecté avec succès.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <input type="text" id="username" name="username" class="form-control" placeholder="Identifiant" required autofocus>
            </div>

            <div class="form-group">
                <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
                <input type="password" id="password" name="password" class="form-control" placeholder="Mot de passe" required>
            </div>

            <button type="submit" class="btn-submit">Se connecter</button>
        </form>
    </div>

</body>
</html>
