services:
  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    env_file: .env
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:?MARIADB_DATABASE is required}
      MARIADB_USER: ${DB_USER:?DB_USER is required}
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD is required}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mariadb://mariadb:3306/${MARIADB_DATABASE:?MARIADB_DATABASE is required}

volumes:
  mariadb_data:
